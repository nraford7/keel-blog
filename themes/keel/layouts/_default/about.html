{{ define "main" }}
  <article>
    {{ with .Params.hero }}
      <figure class="hero-image">
        <img src="{{ . | relURL }}" alt="{{ $.Params.hero_alt | default $.Title }}">
      </figure>
    {{ end }}
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
