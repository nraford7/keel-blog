{{ define "main" }}
  <h1 class="section-title">{{ .Title }}</h1>
  {{ .Content }}
  <ul class="taxonomy-list">
    {{ range .Pages }}
      <li class="taxonomy-item">
        <a href="{{ .RelPermalink }}">{{ .LinkTitle }}<span class="taxonomy-count">{{ len .Pages }}</span></a>
      </li>
    {{ end }}
  </ul>
{{ end }}
